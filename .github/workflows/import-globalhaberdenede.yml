name: Import Globalhaberdenede Files

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone source repository
        run: |
          rm -rf /tmp/globalhaberdenede-source
          git clone --depth=1 https://github.com/chaoslightnight2-ctrl/Globalhaberdenede.git /tmp/globalhaberdenede-source

      - name: Replace target contents with source contents except workflows
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          mkdir -p .github/workflows
          tar --exclude='.git' --exclude='.github/workflows' -C /tmp/globalhaberdenede-source -cf - . | tar -xf -

      - name: Commit mirrored non-workflow contents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Mirror Globalhaberdenede files into Quizdenede"
            git push origin HEAD:main
          fi
